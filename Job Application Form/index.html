<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Form</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<form>
<div class="form-header">
<h1>Job Application</h1>
<p>Share your details and availability to join our team.</p>
</div>
<label for="name">Full Name</label>
<input type="text" id="name" name="name" placeholder="Enter your full name" required>
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="name@example.com" required>
<label for="position">Position</label>
<select id="position" name="position" required>
<option value="" hidden>Select a position</option>
<option value="developer">Developer</option>
<option value="designer">Designer</option>
<option value="manager">Manager</option>
</select>
<fieldset class="radio-group">
<legend>Availability</legend>
<div class="radio-row">
<label class="radio-label">
<input type="radio" id="fulltime" name="availability" value="full-time" required>
<span>Full-Time</span>
</label>
<label class="radio-label">
<input type="radio" id="parttime" name="availability" value="part-time">
<span>Part-Time</span>
</label>
</div>
</fieldset>
<label for="message">Message</label>
<textarea id="message" name="message" placeholder="Tell us why you are a great fit" required></textarea>
<button type="submit">Submit Application</button>
</form>
</div>
</body>
</html>

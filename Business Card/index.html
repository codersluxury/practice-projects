<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="Profile picture of a flower">
        
        <p class="full-name">Jane Doe</p>
        <p class="designation">Frontend Developer</p>
        <p class="company">Tech Solutions Inc.</p>
        
        <hr>
        
        <p>jane.doe@example.com</p>
        <p>+1 (555) 000-1234</p>
        
        <a href="https://example.com/portfolio" class="portfolio-link">Portfolio</a>
        
        <hr>
        
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="https://twitter.com">Twitter</a>
            <a href="https://linkedin.com">LinkedIn</a>
            <a href="https://github.com">GitHub</a>
        </div>
    </div>
</body>

</html>
